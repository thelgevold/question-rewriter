services:
  ollama:
    image: ollama/ollama:0.30.10
    container_name: question-rewriter-ollama
    ports:
      - "11436:11434"
    volumes:
      - ollama-data:/root/.ollama
    tty: true

  fine-tuning:
    image: question-rewriter-runtime:latest
    build:
      context: .
      dockerfile: fine_tuning/Dockerfile
    container_name: question-rewriter-fine-tuning
    working_dir: /workspace
    user: "0:0"
    volumes:
      - ./:/workspace
      - huggingface-cache:/root/.cache/huggingface
      - unsloth-cache:/root/.cache/unsloth
      - unsloth-llama-cpp:/root/.unsloth
    environment:
      HF_HOME: /root/.cache/huggingface
      UNSLOTH_LLAMA_CPP_PATH: /root/.unsloth/llama.cpp
    entrypoint: ["python", "-m", "fine_tuning.train"]
    gpus: all
    shm_size: "16gb"
    tty: true
    stdin_open: true

  demo:
    image: question-rewriter-runtime:latest
    build:
      context: .
      dockerfile: fine_tuning/Dockerfile
    container_name: question-rewriter-demo
    working_dir: /workspace
    depends_on:
      - ollama
    volumes:
      - ./:/workspace
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL_NAME: question-rewriter-qwen3-0.6b
      PYTHONUNBUFFERED: "1"
    entrypoint: ["python", "-u", "demo/ollama_chat_demo.py"]
    tty: true

volumes:
  huggingface-cache:
  unsloth-cache:
  unsloth-llama-cpp:
  ollama-data:
